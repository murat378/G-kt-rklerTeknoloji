<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Göktürkler Teknoloji</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #0a1628, #1a2a4a);
    color: white;
    font-family: 'Segoe UI', 'Arial', sans-serif;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* ----- ARKA PLAN ----- */
.bg-glow {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 40%, rgba(34, 197, 94, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(59, 130, 246, 0.08) 0%, transparent 50%);
    z-index: 0;
}

.grid-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: 0;
}

/* ORTA KONTEYNER */
.container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 30px 40px;
    border-radius: 30px;
    background: rgba(26, 42, 74, 0.4);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(34, 197, 94, 0.2);
    max-width: 550px;
    width: 90%;
    box-shadow: 0 15px 30px rgba(0,0,0,0.4);
    transition: opacity 0.3s ease;
}

/* LOGOLAR - HAREKETLİ + HOVER EFEKTİ */
.logos {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 25px;
    margin-bottom: 25px;
}

.logo-wrapper {
    animation: softFloat 3.5s infinite alternate ease-in-out;
    filter: drop-shadow(0 4px 10px rgba(0,0,0,0.4));
    background: rgba(255,255,255,0.03);
    padding: 8px 12px;
    border-radius: 16px;
    backdrop-filter: blur(2px);
    cursor: pointer;
    transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    border: 1px solid transparent;
}

.logo-wrapper:hover {
    transform: scale(1.12) translateY(-4px);
    background: rgba(34, 197, 94, 0.12);
    border: 1px solid rgba(34, 197, 94, 0.4);
    box-shadow: 0 0 30px rgba(34, 197, 94, 0.4), 0 8px 20px rgba(0,0,0,0.5);
    filter: drop-shadow(0 0 20px rgba(34, 197, 94, 0.3));
    animation-play-state: paused;
}

.logo-wrapper:first-child {
    animation-duration: 3s;
}
.logo-wrapper:last-child {
    animation-duration: 3.8s;
    animation-delay: 0.2s;
}

@keyframes softFloat {
    0% { transform: translateY(0px); }
    100% { transform: translateY(-6px); }
}

.logo-wrapper:first-child img {
    height: 70px;
    width: auto;
    object-fit: contain;
    display: block;
    transition: all 0.2s ease;
}

.logo-wrapper:last-child img {
    height: 55px;
    width: auto;
    object-fit: contain;
    display: block;
    transition: all 0.2s ease;
}

.logo-wrapper:hover img {
    filter: brightness(1.1) contrast(1.05);
}

/* BAŞLIK */
.title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 12px;
    color: #ffffff;
    text-shadow: 0 0 20px rgba(34,197,94,0.4);
}

/* ALT METİN */
.sub {
    font-size: 15px;
    opacity: 0.9;
    margin-bottom: 20px;
    font-weight: 300;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    padding-bottom: 18px;
    color: #e2e8f0;
}

/* YÖNLENDİRME METNİ */
.redirect-text {
    margin-bottom: 20px;
    font-size: 13px;
    opacity: 0.7;
    letter-spacing: 1px;
}

/* BUTON */
.btn {
    background: transparent;
    border: 1.5px solid #22c55e;
    color: white;
    font-size: 16px;
    font-weight: 600;
    padding: 12px 32px;
    border-radius: 40px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    background: rgba(34, 197, 94, 0.1);
    box-shadow: 0 0 20px rgba(34,197,94,0.2);
    transition: all 0.25s ease;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: inline-block;
}

.btn:hover {
    background: #22c55e;
    color: #020617;
    box-shadow: 0 0 35px #22c55e;
    transform: scale(1.02);
    border-color: #ffffff;
}

.btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

/* KAYAN YAZI */
.marquee {
    position: absolute;
    bottom: 55px;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    z-index: 15;
    pointer-events: none;
}

.marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: kaydir 14s linear infinite;
    font-size: 13px;
    opacity: 0.7;
    font-weight: 300;
    letter-spacing: 4px;
    color: #bbf7d0;
}

@keyframes kaydir {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

/* PROGRESS (DEKORATİF) */
.bar {
    position: absolute;
    bottom: 22px;
    width: 70%;
    height: 3px;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    left: 15%;
    z-index: 15;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #22c55e, #4ade80, #22c55e);
    background-size: 200% 100%;
    animation: shimmer 3.5s infinite;
    border-radius: 10px;
    opacity: 0.8;
}

@keyframes shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
}

/* SAĞ ALT KÜÇÜK YAZI */
.note {
    position: absolute;
    bottom: 30px;
    right: 30px;
    z-index: 20;
    font-size: 11px;
    opacity: 0.4;
    color: #a7f3d0;
    pointer-events: none;
}

/* ========== YÜKLEME EKRANI (OVERLAY) ========== */
.loading-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(10, 22, 40, 0.95);
    backdrop-filter: blur(12px);
    z-index: 1000;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
    opacity: 0;
    transition: opacity 0.4s ease;
}

.loading-overlay.show {
    display: flex;
    opacity: 1;
}

.loading-content {
    text-align: center;
    max-width: 400px;
    width: 80%;
}

.loading-icon {
    margin-bottom: 30px;
    animation: pulse 1.5s infinite;
}

.loading-icon svg {
    width: 70px;
    height: 70px;
    filter: drop-shadow(0 0 20px #22c55e);
}

@keyframes pulse {
    0%, 100% { transform: scale(1); opacity: 0.8; }
    50% { transform: scale(1.08); opacity: 1; }
}

.loading-title {
    font-size: 22px;
    font-weight: 600;
    margin-bottom: 8px;
    color: #fff;
    text-shadow: 0 0 15px #22c55e;
    letter-spacing: 2px;
}

.loading-sub {
    font-size: 13px;
    opacity: 0.7;
    margin-bottom: 30px;
    color: #bbf7d0;
}

/* Yükleme çubuğu */
.loading-bar-container {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 15px;
    box-shadow: inset 0 1px 3px rgba(0,0,0,0.3);
}

.loading-bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #22c55e, #4ade80, #22c55e);
    background-size: 200% 100%;
    border-radius: 20px;
    box-shadow: 0 0 15px #22c55e;
    transition: width 0.08s linear;
    animation: barShimmer 1.5s infinite;
}

@keyframes barShimmer {
    0% { background-position: 0% 0; }
    100% { background-position: 200% 0; }
}

.loading-percent {
    font-size: 18px;
    font-weight: 700;
    color: #4ade80;
    text-shadow: 0 0 10px #22c55e;
    letter-spacing: 2px;
}

.loading-status {
    margin-top: 25px;
    font-size: 12px;
    opacity: 0.5;
    color: #a7f3d0;
    min-height: 20px;
}

/* Dönen noktalar animasyonu */
.dots::after {
    content: '';
    animation: dots 1.5s steps(4, end) infinite;
}

@keyframes dots {
    0%, 20% { content: ''; }
    40% { content: '.'; }
    60% { content: '..'; }
    80%, 100% { content: '...'; }
}
</style>

</head>
<body>

<!-- ARKA PLAN -->
<div class="bg-glow"></div>
<div class="grid-overlay"></div>

<!-- ANA İÇERİK -->
<div class="container" id="mainContainer">

    <!-- LOGOLAR -->
    <div class="logos">
        <div class="logo-wrapper">
            <img src="gokturkler.png" alt="Göktürkler Logo">
        </div>
        <div class="logo-wrapper">
            <img src="yesilyurt.png" alt="Yeşilyurt Logo">
        </div>
    </div>

    <!-- BAŞLIK -->
    <div class="title">
        GÖKTÜRKLER TEKNOLOJİ KULÜBÜ
    </div>

    <div class="sub">
        Afet İletişim & Keşif Otonom Dronu
    </div>

    <div class="redirect-text">
        Detaylı rapor için butona tıklayın
    </div>

    <!-- BUTON -->
    <button class="btn" id="raporBtn">📋 Raporu Görüntüle</button>

</div>

<!-- KAYAN YAZI -->
<div class="marquee">
    <span>
        GÖKTÜRK RUHU • YOLOv12 • BLE ACİL SİSTEM • OTONOM UÇUŞ • MİLLİ TEKNOLOJİ • KARABÜK 2026
    </span>
</div>

<!-- DEKORATİF PROGRESS -->
<div class="bar">
    <div class="progress"></div>
</div>

<div class="note">Karabük • 2026</div>

<!-- ========== YÜKLEME EKRANI ========== -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="loading-content">
        <div class="loading-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2L2 7L12 12L22 7L12 2Z" stroke="#22c55e" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M2 17L12 22L22 17" stroke="#22c55e" stroke-width="1.5" stroke-linejoin="round"/>
                <path d="M2 12L12 17L22 12" stroke="#22c55e" stroke-width="1.5" stroke-linejoin="round"/>
                <circle cx="12" cy="12" r="2" fill="#4ade80" opacity="0.6">
                    <animate attributeName="r" values="2;3;2" dur="2s" repeatCount="indefinite"/>
                    <animate attributeName="opacity" values="0.6;1;0.6" dur="2s" repeatCount="indefinite"/>
                </circle>
            </svg>
        </div>
        
        <div class="loading-title">
            Rapor Hazırlanıyor
        </div>
        <div class="loading-sub">
            Göktürkler Teknoloji Kulübü
        </div>
        
        <div class="loading-bar-container">
            <div class="loading-bar" id="loadingBar"></div>
        </div>
        
        <div class="loading-percent" id="loadingPercent">%0</div>
        
        <div class="loading-status" id="loadingStatus">
            Sistem başlatılıyor<span class="dots"></span>
        </div>
    </div>
</div>

<script>
    const pdfLink = "rapor.pdf";
    const raporBtn = document.getElementById('raporBtn');
    const loadingOverlay = document.getElementById('loadingOverlay');
    const mainContainer = document.getElementById('mainContainer');
    const loadingBar = document.getElementById('loadingBar');
    const loadingPercent = document.getElementById('loadingPercent');
    const loadingStatus = document.getElementById('loadingStatus');

    // Durum mesajları
    const statusMessages = [
        "Sistem başlatılıyor",
        "Veriler hazırlanıyor",
        "Rapor oluşturuluyor",
        "PDF hazırlanıyor",
        "Neredeyse tamam"
    ];

    let progressInterval;
    let statusInterval;
    let progress = 0;

    function startLoading() {
        // Butonu devre dışı bırak
        raporBtn.disabled = true;
        
        // Overlay'i göster
        loadingOverlay.classList.add('show');
        
        // Progress değerini sıfırla
        progress = 0;
        loadingBar.style.width = '0%';
        loadingPercent.textContent = '%0';
        loadingStatus.innerHTML = 'Sistem başlatılıyor<span class="dots"></span>';
        
        // Progress bar animasyonu
        progressInterval = setInterval(() => {
            // Hızlı başla, yavaş bitir (gerçekçi yükleme hissi)
            if (progress < 30) {
                progress += 2.5;
            } else if (progress < 60) {
                progress += 1.5;
            } else if (progress < 85) {
                progress += 0.8;
            } else if (progress < 98) {
                progress += 0.3;
            } else {
                progress = 99; // 100'de takılı kalmasın diye
            }
            
            if (progress >= 100) {
                progress = 100;
                clearInterval(progressInterval);
            }
            
            loadingBar.style.width = progress + '%';
            loadingPercent.textContent = '%' + Math.floor(progress);
            
            // 100 olunca yönlendir
            if (progress >= 99.5) {
                setTimeout(() => {
                    window.location.href = pdfLink;
                }, 200);
            }
        }, 60);
        
        // Durum mesajlarını değiştir
        let statusIndex = 0;
        statusInterval = setInterval(() => {
            if (progress < 95) {
                statusIndex = (statusIndex + 1) % statusMessages.length;
                loadingStatus.innerHTML = statusMessages[statusIndex] + '<span class="dots"></span>';
            } else if (progress >= 95) {
                loadingStatus.innerHTML = 'Rapor açılıyor ✨';
                clearInterval(statusInterval);
            }
        }, 700);
    }

    // Butona tıklayınca yükleme başlasın
    raporBtn.addEventListener('click', function(e) {
        e.preventDefault();
        startLoading();
    });

    // Sayfa yüklendiğinde hazır
    console.log('Göktürkler Teknoloji - Yükleme ekranı hazır');
</script>

</body>
</html>
