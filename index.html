<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Göktürkler Teknoloji</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    margin: 0;
    height: 100vh;
    background: linear-gradient(135deg, #020617, #0f172a);
    color: white;
    font-family: 'Segoe UI', 'Arial', sans-serif;
    overflow: hidden;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* ----- ARKA PLAN (SADE, BOŞLUĞU DOLDURUR) ----- */
.bg-glow {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 30% 40%, rgba(34, 197, 94, 0.06) 0%, transparent 50%),
                radial-gradient(circle at 70% 60%, rgba(59, 130, 246, 0.05) 0%, transparent 50%);
    z-index: 0;
}

.grid-overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
        linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 50px 50px;
    z-index: 0;
}

/* ORTA KONTEYNER */
.container {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 30px 40px;
    border-radius: 30px;
    background: rgba(15, 23, 42, 0.25);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(34, 197, 94, 0.12);
    max-width: 550px;
    width: 90%;
    box-shadow: 0 15px 30px rgba(0,0,0,0.3);
}

/* LOGOLAR - HAREKETLİ (SADE) */
.logos {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    margin-bottom: 25px;
}

.logo-wrapper {
    animation: softFloat 3.5s infinite alternate ease-in-out;
    filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
}

.logo-wrapper:first-child {
    animation-duration: 3s;
}
.logo-wrapper:last-child {
    animation-duration: 3.8s;
    animation-delay: 0.2s;
}

@keyframes softFloat {
    0% { transform: translateY(0px); }
    100% { transform: translateY(-6px); }
}

.logos img {
    height: 55px;
    width: auto;
    object-fit: contain;
    display: block;
}

/* BAŞLIK */
.title {
    font-size: 24px;
    font-weight: 700;
    letter-spacing: 3px;
    margin-bottom: 12px;
    color: #ffffff;
    text-shadow: 0 0 15px rgba(34,197,94,0.3);
}

/* ALT METİN */
.sub {
    font-size: 15px;
    opacity: 0.85;
    margin-bottom: 20px;
    font-weight: 300;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 18px;
}

/* YÖNLENDİRME METNİ */
.redirect-text {
    margin-bottom: 20px;
    font-size: 13px;
    opacity: 0.6;
    letter-spacing: 1px;
}

/* BUTON */
.btn {
    background: transparent;
    border: 1.5px solid #22c55e;
    color: white;
    font-size: 16px;
    font-weight: 600;
    padding: 12px 32px;
    border-radius: 40px;
    cursor: pointer;
    backdrop-filter: blur(4px);
    background: rgba(34, 197, 94, 0.08);
    box-shadow: 0 0 20px rgba(34,197,94,0.15);
    transition: all 0.25s ease;
    letter-spacing: 2px;
    text-transform: uppercase;
    display: inline-block;
}

.btn:hover {
    background: #22c55e;
    color: #020617;
    box-shadow: 0 0 30px #22c55e;
    transform: scale(1.02);
    border-color: #ffffff;
}

/* KAYAN YAZI */
.marquee {
    position: absolute;
    bottom: 55px;
    width: 100%;
    white-space: nowrap;
    overflow: hidden;
    z-index: 15;
    pointer-events: none;
}

.marquee span {
    display: inline-block;
    padding-left: 100%;
    animation: kaydir 14s linear infinite;
    font-size: 13px;
    opacity: 0.6;
    font-weight: 300;
    letter-spacing: 4px;
    color: #bbf7d0;
}

@keyframes kaydir {
    0% { transform: translateX(0); }
    100% { transform: translateX(-100%); }
}

/* PROGRESS (DEKORATİF) */
.bar {
    position: absolute;
    bottom: 22px;
    width: 70%;
    height: 3px;
    background: rgba(255,255,255,0.03);
    border-radius: 10px;
    left: 15%;
    z-index: 15;
    overflow: hidden;
}

.progress {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, #22c55e, #4ade80, #22c55e);
    background-size: 200% 100%;
    animation: shimmer 3.5s infinite;
    border-radius: 10px;
    opacity: 0.7;
}

@keyframes shimmer {
    0% { background-position: 100% 0; }
    100% { background-position: -100% 0; }
}

/* SAĞ ALT KÜÇÜK YAZI */
.note {
    position: absolute;
    bottom: 30px;
    right: 30px;
    z-index: 20;
    font-size: 11px;
    opacity: 0.3;
    color: #a7f3d0;
    pointer-events: none;
}
</style>

</head>
<body>

<!-- ARKA PLAN SADE GLOW + GRID -->
<div class="bg-glow"></div>
<div class="grid-overlay"></div>

<div class="container">

    <!-- LOGOLAR (PNG) - HAREKETLİ -->
    <div class="logos">
        <div class="logo-wrapper">
            <img src="gokturkler.png" alt="Göktürkler Logo">
        </div>
        <div class="logo-wrapper">
            <img src="yesilyurt.png" alt="Yeşilyurt Logo">
        </div>
    </div>

    <!-- BAŞLIK -->
    <div class="title">
        GÖKTÜRKLER TEKNOLOJİ KULÜBÜ
    </div>

    <div class="sub">
        Afet İletişim & Keşif Otonom Dronu
    </div>

    <div class="redirect-text">
        Detaylı rapor için butona tıklayın
    </div>

    <!-- BUTON -->
    <button class="btn" id="raporBtn">📋 Raporu Görüntüle</button>

</div>

<!-- KAYAN YAZI -->
<div class="marquee">
    <span>
        GÖKTÜRK RUHU • YOLOv12 • BLE ACİL SİSTEM • OTONOM UÇUŞ • MİLLİ TEKNOLOJİ • KARABÜK 2026
    </span>
</div>

<!-- DEKORATİF PROGRESS -->
<div class="bar">
    <div class="progress"></div>
</div>

<div class="note">Karabük • 2026</div>

<script>
    const pdfLink = "rapor.pdf";  // PDF dosyanızın adı

    document.getElementById('raporBtn').addEventListener('click', function() {
        window.location.href = pdfLink;
    });

    // Otomatik yönlendirme yok. Sadece buton çalışır.
    // Logolar PNG formatında, hareketli (yumuşak float animasyonu)
</script>

</body>
</html>
